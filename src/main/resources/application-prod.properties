# Production profile configuration (run with: --spring.profiles.active=prod)
spring.application.name=Hongshuo-ERP

# Server
server.port=8081
server.servlet.context-path=/

# H2: allow multiple processes to open same DB file (mitigate file lock waits)
# If you deploy multiple instances against the same filesystem DB, consider moving to a real DB (PostgreSQL/MySQL).
spring.datasource.url=jdbc:h2:file:./data/hongshuo_erp;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Fail fast on DB connectivity issues
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=5000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# IMPORTANT: do NOT wipe data on prod startup
app.data.reset-on-startup=false

# For a fresh production database, provide APP_SECURITY_BOOTSTRAP_DEFAULT_PASSWORD once.
# Do not enable the insecure development default in production.
app.security.allow-insecure-default-password=false

# Disable H2 console on prod
spring.h2.console.enabled=false

# Jackson（与默认环境一致，避免 JPA 双向关联序列化栈溢出）
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-self-references=false
spring.jackson.time-zone=Asia/Shanghai

# Actuator health (used by ops health checks)
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
